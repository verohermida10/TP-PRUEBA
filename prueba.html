   <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketPlace Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="logo">🛒 MarketPlace Pro</div>

    <nav>
      <a href="#">Inicio</a>
      <a href="#">Tecnología</a>
      <a href="#">Moda</a>
      <a href="#">Gaming</a>
      <a href="#">Contacto</a>
    </nav>

    <button id="cart-btn">
      Carrito 🛒 <span id="cart-count">0</span>
    </button>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Comprá lo mejor al mejor precio</h1>
      <p>
        Tecnología, gaming, moda y accesorios con envío gratis.
      </p>
      <button>Ver ofertas</button>
    </div>
  </section>

  <main>
    <h2 class="section-title">🔥 Productos Destacados</h2>

    <section class="products" id="products-container">
      <!-- JS -->
    </section>
  </main>

  <!-- CARRITO -->
  <aside class="cart" id="cart">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button id="close-cart">✖</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
      <h3>Total: $<span id="total">0</span></h3>
      <button class="buy-btn">Finalizar compra</button>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
