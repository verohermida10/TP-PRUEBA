<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">ShopMarket</div>

    <nav>
      <a href="#">Inicio</a>
      <a href="#">Productos</a>
      <a href="#">Ofertas</a>
      <a href="#">Contacto</a>
    </nav>

    <button id="cart-btn">
      🛒 Carrito (<span id="cart-count">0</span>)
    </button>
  </header>

  <main>
    <section class="hero">
      <h1>Compra y vende productos fácilmente</h1>
      <p>Encuentra las mejores ofertas en tecnología, ropa y más.</p>
    </section>

    <section class="products" id="products-container">
      <!-- Productos generados con JS -->
    </section>
  </main>

  <div class="cart-modal" id="cart-modal">
    <div class="cart-content">
      <h2>Carrito</h2>

      <ul id="cart-items"></ul>

      <h3>Total: $<span id="total">0</span></h3>

      <button id="close-cart">Cerrar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
